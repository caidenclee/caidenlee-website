<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Caiden's Tools</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0f;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 80px 24px 0;
      overflow: hidden;
    }

    .top {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 40px;
    }

    .middle {
      display: flex;
      justify-content: center;
      width: 100%;
    }

    body::before {
      content: '';
      position: fixed;
      top: -120px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 400px;
      background: radial-gradient(ellipse, rgba(109,40,217,0.1) 0%, transparent 70%);
      filter: blur(30px);
      pointer-events: none;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeSlow {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .wordmark {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #3a3a52;
      margin-bottom: 12px;
    }

    h1 {
      font-size: 72px;
      font-weight: 900;
      color: #ede8ff;
      letter-spacing: -0.04em;
      margin-bottom: 6px;
      animation: fadeSlow 0.7s ease both;
    }

    .subtitle {
      font-size: 14px;
      color: #3a3a52;
      margin-bottom: 0;
      font-weight: 500;
      animation: fadeSlow 0.7s ease 0.2s both;
    }

    .tools {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
      max-width: 420px;
      animation: fadeSlow 0.7s ease 0.4s both;
    }

    .tool-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 28px;
      border-radius: 18px;
      background: #13131e;
      border: 1px solid rgba(109,40,217,0.3);
      color: #e8e8f0;
      font-size: 15px;
      font-weight: 700;
      text-decoration: none;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
    }

    .tool-link:hover {
      background: #1a1a2e;
      border-color: #6d28d9;
      color: #fff;
    }

    .tool-link:active {
      transform: scale(0.98);
    }

    .tool-link .arrow {
      font-size: 18px;
      color: rgba(109,40,217,0.7);
      transition: color 0.15s, transform 0.15s;
    }

    .tool-link:hover .arrow {
      color: #6d28d9;
      transform: translateX(3px);
    }

    .divider {
      width: 40px;
      height: 1px;
      background: #1e1e2e;
      margin: 8px auto 0;
    }
  </style>
</head>
<body>
  <div class="top">
    <h1>Caiden's Tools</h1>
    <div style="width:200px;height:2px;background:rgba(255,255,255,0.12);margin-top:20px;border-radius:2px;"></div>
  </div>

  <div class="middle">
    <div class="tools">
      <a href="cross-trainer.html" class="tool-link">
        <span>Cross+3 Trainer</span>
        <span class="arrow">→</span>
      </a>
      <a href="wca-sim.html" class="tool-link">
        <span>Comp Sim Trainer</span>
        <span class="arrow">→</span>
      </a>
    </div>
  </div>

</body>
</html>
