<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Caiden's Tools</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0f13;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 40px 24px;
    }

    a {
      display: block;
      width: 100%;
      max-width: 420px;
      padding: 20px 32px;
      border-radius: 100px;
      background: #1a1a24;
      border: 1px solid #252534;
      color: #e8e8e8;
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
      text-align: center;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
    }

    a:hover {
      background: #22223a;
      border-color: #6d28d9;
      color: #fff;
    }

    a:active {
      transform: scale(0.97);
    }
  </style>
</head>
<body>
  <a href="cross-trainer.html">Cross+3 Trainer</a>
  <a href="wca-sim.html">Comp Sim Trainer</a>
</body>
</html>
