<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WCA Competition Simulator</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; background: #0f0f13; color: #e8e8e8; font-family: -apple-system, 'Segoe UI', sans-serif; }

    @keyframes blink { 0%,80%,100%{opacity:.15} 40%{opacity:1} }
    .dot { display:inline-block;width:7px;height:7px;border-radius:50%;background:#aaa;margin:0 2px;animation:blink 1.4s infinite ease-in-out; }
    .dot:nth-child(2){animation-delay:.2s}
    .dot:nth-child(3){animation-delay:.4s}

    @keyframes urgentPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
    .urgent { animation: urgentPulse .45s ease-in-out infinite; }

    input[type=range] { accent-color: #7c3aed; cursor: pointer; }
    input::placeholder { color: #666670 !important; opacity: 1 !important; }

    .phase-pill {
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .03em;
    }
    .phase-active { background: #6d28d9; color: white; }
    .phase-done   { color: #4a4a5a; }
    .phase-future { color: #2e2e3e; }

    /* Scoresheet export — explicit so html2canvas captures correctly */
    .ss-export {
      background: #fff !important;
      color: #000 !important;
      font-family: Arial, sans-serif !important;
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

// ─────────────────────────────────────────────────────────────────────────────
// SCRAMBLE GENERATOR (WCA-style, ~20 moves, no same-face or sandwich repeats)
// ─────────────────────────────────────────────────────────────────────────────
function generateScramble(length = 20) {
  const faces = ['U','D','R','L','F','B'];
  const opp   = {U:'D',D:'U',R:'L',L:'R',F:'B',B:'F'};
  const mods  = ['', "'", '2'];
  const moves = [];
  let last = null, prev = null;
  while (moves.length < length) {
    const f = faces[Math.floor(Math.random() * 6)];
    if (f === last) continue;
    if (f === prev && opp[f] === last) continue;
    moves.push(f + mods[Math.floor(Math.random() * 3)]);
    prev = last; last = f;
  }
  return moves.join(' ');
}

// ─────────────────────────────────────────────────────────────────────────────
// CS TIMER CUBE ENGINE (exact port from cstimer by cs0x7f)
// ─────────────────────────────────────────────────────────────────────────────
let _csPosit = [];
function _csDoslice(f, d, q, size) {
  const s2 = size * size;
  let c, f1, f2, f3, f4;
  if (f > 5) f -= 6;
  for (let k = 0; k < q; k++) {
    for (let i = 0; i < size; i++) {
      if (f===0){ f1=6*s2-size*d-size+i; f2=2*s2-size*d-1-i; f3=3*s2-size*d-1-i; f4=5*s2-size*d-size+i; }
      else if(f===1){ f1=3*s2+d+size*i; f2=3*s2+d-size*(i+1); f3=s2+d-size*(i+1); f4=5*s2+d+size*i; }
      else if(f===2){ f1=3*s2+d*size+i; f2=4*s2+size-1-d+size*i; f3=d*size+size-1-i; f4=2*s2-1-d-size*i; }
      else if(f===3){ f1=4*s2+d*size+size-1-i; f2=2*s2+d*size+i; f3=s2+d*size+i; f4=5*s2+d*size+size-1-i; }
      else if(f===4){ f1=6*s2-1-d-size*i; f2=size-1-d+size*i; f3=2*s2+size-1-d+size*i; f4=4*s2-1-d-size*i; }
      else { f1=4*s2-size-d*size+i; f2=2*s2-size+d-size*i; f3=s2-1-d*size-i; f4=4*s2+d+size*i; }
      c=_csPosit[f1]; _csPosit[f1]=_csPosit[f2]; _csPosit[f2]=_csPosit[f3]; _csPosit[f3]=_csPosit[f4]; _csPosit[f4]=c;
    }
    if (d===0) {
      for (let i=0; i+i<size; i++) {
        for (let j=0; j+j<size-1; j++) {
          f1=f*s2+i+j*size; f3=f*s2+(size-1-i)+(size-1-j)*size;
          if(f<3){ f2=f*s2+(size-1-j)+i*size; f4=f*s2+j+(size-1-i)*size; }
          else   { f4=f*s2+(size-1-j)+i*size; f2=f*s2+j+(size-1-i)*size; }
          c=_csPosit[f1]; _csPosit[f1]=_csPosit[f2]; _csPosit[f2]=_csPosit[f3]; _csPosit[f3]=_csPosit[f4]; _csPosit[f4]=c;
        }
      }
    }
  }
}
function _csGenPosit(size, moveseq) {
  _csPosit = [];
  for (let i=0; i<6*size*size; i++) _csPosit[i]=Math.floor(i/(size*size));
  for (let s=0; s<moveseq.length; s++)
    for (let d=0; d<moveseq[s][1]; d++) _csDoslice(moveseq[s][0], d, moveseq[s][2], size);
  return [..._csPosit];
}
function _csParseScramble(scramble) {
  const moveMap='DLBURF', result=[];
  for (const mv of scramble.trim().split(/\s+/)) {
    const m = /^([FRUBLD])(['2])?$/.exec(mv);
    if (!m) continue;
    const p = m[2]==='2'?2 : m[2]==="'"?3 : 1;
    result.push([moveMap.indexOf(m[1]), 1, p]);
  }
  return result;
}

// ─────────────────────────────────────────────────────────────────────────────
// CUBE NET SVG RENDERER
// WCA colors: D=yellow, L=orange, B=blue, U=white, R=red, F=green
// CS Timer face order in posit[]: D=0,L=1,B=2,U=3,R=4,F=5
// Net layout col/row: D=[1,2] L=[0,1] B=[3,1] U=[1,0] R=[2,1] F=[1,1]
// ─────────────────────────────────────────────────────────────────────────────
function renderCubeNetSVG(scramble, cell=18) {
  const size=3, moveseq=_csParseScramble(scramble), p=_csGenPosit(size,moveseq);
  const fill=['#ffff00','#ff8800','#0000ff','#ffffff','#ff0000','#00cc00'];
  const gap=1.5, pad=4, step=cell+gap;
  const fpos=[[1,2],[0,1],[3,1],[1,0],[2,1],[1,1]];
  const W=pad*2+step*4*size-gap, H=pad*2+step*3*size-gap;
  let svg=`<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}">`;
  for (let f=0; f<6; f++) {
    const ox=pad+fpos[f][0]*step*size, oy=pad+fpos[f][1]*step*size;
    svg+=`<rect x="${ox-1}" y="${oy-1}" width="${step*size-gap+2}" height="${step*size-gap+2}" rx="2" fill="#2a2a32"/>`;
    for (let i=0; i<size; i++) {
      const xi=(f===1||f===2)?size-1-i:i;
      for (let j=0; j<size; j++) {
        const yj=(f===0)?size-1-j:j;
        const ci=p[(f*size+yj)*size+xi];
        svg+=`<rect x="${ox+i*step}" y="${oy+j*step}" width="${cell}" height="${cell}" rx="1.5" fill="${fill[ci]}" stroke="#111" stroke-width="0.6"/>`;
      }
    }
  }
  svg+='</svg>';
  return svg;
}

// ─────────────────────────────────────────────────────────────────────────────
// AUDIO MANAGER
// ─────────────────────────────────────────────────────────────────────────────
const Audio = {
  ctx: null, initialized: false,

  init() {
    if (this.initialized) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    this.initialized = true;
  },

  resume() { if(this.ctx?.state==='suspended') this.ctx.resume(); },

  beep(freq=880, dur=0.18) {
    if(!this.ctx) return;
    const t=this.ctx.currentTime;
    const o=this.ctx.createOscillator(), g=this.ctx.createGain();
    o.type='sine'; o.frequency.value=freq;
    g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.35,t+0.01);
    g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.connect(g); g.connect(this.ctx.destination);
    o.start(t); o.stop(t+dur+0.05);
  },

  announce(text) {
    try {
      speechSynthesis.cancel();
      const u=new SpeechSynthesisUtterance(text);
      u.rate=1.05; u.pitch=0.95; u.volume=0.95;
      speechSynthesis.speak(u);
    } catch(e) { this.beep(660,0.25); }
  },
};

// ─────────────────────────────────────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────────────────────────────────────
function fmtTime(ms) {
  if (ms == null || ms < 0) return '—';
  const s = ms / 1000;
  if (s >= 60) {
    const m=Math.floor(s/60), sec=(s%60).toFixed(2).padStart(5,'0');
    return `${m}:${sec}`;
  }
  return s.toFixed(2);
}

function parseTime(str) {
  if (!str) return null;
  str = str.trim();
  const colon = str.indexOf(':');
  if (colon >= 0) {
    const m=parseFloat(str.slice(0,colon)), s=parseFloat(str.slice(colon+1));
    if (isNaN(m)||isNaN(s)) return null;
    return Math.round((m*60+s)*1000);
  }
  const v=parseFloat(str);
  return isNaN(v)?null:Math.round(v*1000);
}

function calcAo5(results) {
  if (results.length < 5) return { ao5: null, isDNF: false, droppedIdxs: new Set() };
  const finals = results.map(r => r.penalty==='DNF' ? Infinity : r.ms + (r.penalty==='+2'?2000:0));
  const dnfs = finals.filter(v=>v===Infinity).length;
  if (dnfs > 1) return { ao5: null, isDNF: true, droppedIdxs: new Set() };
  const sorted = finals.map((v,i)=>({v,i})).sort((a,b)=>a.v-b.v);
  const droppedIdxs = new Set([sorted[0].i, sorted[4].i]);
  const mid = sorted.slice(1,4).map(x=>x.v);
  if (mid.some(v=>v===Infinity)) return { ao5: null, isDNF: true, droppedIdxs };
  return { ao5: Math.round(mid.reduce((a,b)=>a+b,0)/3), isDNF: false, droppedIdxs };
}

function fmtResult(r) {
  if (!r) return '—';
  if (r.penalty==='DNF') return 'DNF';
  const base = fmtTime(r.ms);
  if (r.penalty==='+2') return fmtTime(r.ms+2000)+'+';
  return base;
}

function getFinalMs(r) {
  if (!r || r.penalty==='DNF') return null;
  return r.ms + (r.penalty==='+2'?2000:0);
}

// ─────────────────────────────────────────────────────────────────────────────
// SUB-COMPONENTS
// ─────────────────────────────────────────────────────────────────────────────
function WaitingDots() {
  return (
    <span style={{display:'inline-flex',alignItems:'center',gap:3,marginLeft:4}}>
      <span className="dot"/><span className="dot"/><span className="dot"/>
    </span>
  );
}

function PhaseBar({ phase, completedCount }) {
  const PHASES = ['Scramble','Waiting','Received Cube','Inspection','Solving','Enter Time','Waiting'];
  const MAP = { scrambling:0,'waiting-pickup':1,'receive-cube':2,inspection:3,solving:4,'entering-time':5,'waiting-next':6 };
  const cur = MAP[phase] ?? -1;
  const solveDisplay = phase==='waiting-next' ? completedCount : completedCount+1;
  return (
    <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap',marginBottom:24}}>
      <span style={{fontSize:11,color:'#5a5a6a',marginRight:4,fontWeight:600}}>
        Solve {Math.min(solveDisplay,5)}/5
      </span>
      <span style={{color:'#2e2e3e',fontSize:11}}>·</span>
      {PHASES.map((p,i)=>(
        <React.Fragment key={i}>
          {i>0&&<span style={{color:'#2a2a38',fontSize:10}}>›</span>}
          <span className={`phase-pill ${i===cur?'phase-active':i<cur?'phase-done':'phase-future'}`}>{p}</span>
        </React.Fragment>
      ))}
    </div>
  );
}

function CubeNet({ scramble, cell=18 }) {
  const svg = useMemo(()=>renderCubeNetSVG(scramble,cell),[scramble,cell]);
  return (
    <div
      style={{display:'inline-block',borderRadius:10,overflow:'hidden',background:'#1a1a22',padding:6}}
      dangerouslySetInnerHTML={{__html:svg}}
    />
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// LIVE SCORESHEET (sidebar, always visible during session)
// ─────────────────────────────────────────────────────────────────────────────
function LiveScoresheet({ results, completedCount, meta }) {
  const border = '1px solid #000';
  const tdStyle = {border, padding:'6px 8px', fontSize:11, fontFamily:'Arial,sans-serif', color:'#000'};
  const { droppedIdxs } = calcAo5(results.length===5 ? results : []);

  return (
    <div style={{background:'#fff',borderRadius:12,padding:'16px 14px',fontFamily:'Arial,sans-serif',color:'#000'}}>

      {/* Competition name */}
      <div style={{textAlign:'center',fontWeight:700,fontSize:15,marginBottom:12}}>
        {meta.competition || 'Cubing at Home'}
      </div>

      {/* Event / Round row */}
      <table style={{width:'100%',borderCollapse:'collapse',marginBottom:6}}>
        <thead>
          <tr>
            <th style={{...tdStyle,textAlign:'left',fontWeight:400,border:'none',paddingBottom:2}}>Event</th>
            <th style={{...tdStyle,textAlign:'center',fontWeight:400,border:'none',paddingBottom:2}}>Round</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td style={{...tdStyle,fontWeight:700,fontSize:13}}>3x3x3 Cube</td>
            <td style={{...tdStyle,textAlign:'center',fontWeight:700,fontSize:13,width:48}}>{meta.round||'1'}</td>
          </tr>
        </tbody>
      </table>

      {/* Name row */}
      <table style={{width:'100%',borderCollapse:'collapse',marginBottom:12}}>
        <thead>
          <tr>
            <th style={{...tdStyle,fontWeight:400,border:'none',paddingBottom:2,textAlign:'left'}}>Name</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td style={{...tdStyle,fontWeight:700,fontSize:13}}>{meta.name||'—'}</td>
          </tr>
        </tbody>
      </table>

      {/* Results table */}
      <table style={{width:'100%',borderCollapse:'collapse'}}>
        <thead>
          <tr style={{background:'#f0f0f0'}}>
            <th style={{...tdStyle,width:20}}>#</th>
            <th style={{...tdStyle,textAlign:'center'}}>Result</th>
            <th style={{...tdStyle,width:36,textAlign:'center'}}>Comp</th>
          </tr>
        </thead>
        <tbody>
          {[0,1,2,3,4].map(i=>{
            const r = results[i];
            const isActive = i===completedCount && !r;
            const dropped = results.length===5 && droppedIdxs && droppedIdxs.has(i);
            return (
              <tr key={i} style={{background: i%2===0?'#fff':'#fafafa'}}>
                <td style={{...tdStyle,fontWeight:700,fontSize:14}}>{i+1}</td>
                <td style={{...tdStyle,textAlign:'center',fontFamily:'monospace',fontWeight:700,fontSize:13,
                  textDecoration: dropped?'line-through':'none',
                  opacity: dropped?0.4:1,
                  color: isActive?'#9999cc':'#000'
                }}>
                  {r ? fmtResult(r) : ''}
                </td>
                <td style={{...tdStyle,textAlign:'center'}}></td>
              </tr>
            );
          })}
          {/* Extra attempt */}
          <tr>
            <td style={{...tdStyle,fontWeight:700,fontSize:14,color:'#888'}}>—</td>
            <td style={{...tdStyle}}></td>
            <td style={{...tdStyle}}></td>
          </tr>
        </tbody>
      </table>
      <div style={{fontSize:10,color:'#888',marginTop:6,textAlign:'right'}}>Extra attempt</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// SESSION SUMMARY
// ─────────────────────────────────────────────────────────────────────────────
function SessionSummary({ results, meta, onNewSession, currentRound, totalRounds, roundHistory, onNextRound }) {
  const allDone = currentRound === totalRounds;
  const [viewRound, setViewRound] = React.useState(currentRound);

  // The results to display — either current or a historical round
  const displayResults = allDone && roundHistory.length > 0
    ? (roundHistory.find(r => r.round === viewRound)?.results || results)
    : results;

  const { ao5, isDNF, droppedIdxs } = calcAo5(displayResults);
  const finals = displayResults.map(getFinalMs);
  const validFinals = finals.filter(v=>v!=null);
  const bestMs = validFinals.length ? Math.min(...validFinals) : null;
  const bestIdx = bestMs!=null ? finals.indexOf(bestMs) : -1;
  const ao5Str = isDNF?'DNF':ao5?fmtTime(ao5):'—';
  const bestStr = bestMs!=null?fmtTime(bestMs):'—';
  const scoresheetRef = useRef(null);
  const [copied, setCopied] = useState(false);
  const [downloading, setDownloading] = useState(false);

  function buildText() {
    const lines = [
      `${meta.name||'Competitor'} — 3x3x3`,
      `${meta.competition||'Cubing at Home'} | Round ${viewRound}`,
      '',
      ...displayResults.map((r,i)=>{
        let s = fmtResult(r);
        if (droppedIdxs.has(i)) s = `(${s})`;
        return s;
      }),
      '',
      `Best: ${bestStr} | Ao5: ${ao5Str}`,
    ];
    return lines.join('\n');
  }

  async function copyText() {
    try { await navigator.clipboard.writeText(buildText()); } catch(e) {}
    setCopied(true); setTimeout(()=>setCopied(false),2000);
  }

  async function downloadImage() {
    if (!scoresheetRef.current || !window.html2canvas) return;
    setDownloading(true);
    try {
      const canvas = await html2canvas(scoresheetRef.current,{backgroundColor:'#ffffff',scale:2,useCORS:true});
      const a=document.createElement('a');
      a.download=`scoresheet-${(meta.name||'competitor').replace(/\s+/g,'-')}.png`;
      a.href=canvas.toDataURL('image/png'); a.click();
    } finally { setDownloading(false); }
  }

  return (
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',padding:'40px 16px',background:'#0f0f13'}}>
      <div style={{width:'100%',maxWidth:520}}>

        <div style={{textAlign:'center',marginBottom:28}}>
          <div style={{fontSize:26,fontWeight:900,color:'#e8e8e8',letterSpacing:'-0.03em',marginBottom:4}}>
            {allDone && totalRounds > 1 ? 'All Rounds Complete' : `Round ${currentRound} Complete`}
          </div>
          <div style={{fontSize:13,color:'#4a4a5a'}}>
            {totalRounds > 1 ? `Round ${currentRound} of ${totalRounds}` : '5 solves recorded'}
          </div>
        </div>

        {/* Round toggle — only when all rounds done */}
        {allDone && totalRounds > 1 && (
          <div style={{display:'flex',gap:8,justifyContent:'center',marginBottom:24}}>
            {roundHistory.map(({round})=>(
              <button key={round} onClick={()=>setViewRound(round)} style={{
                padding:'8px 20px',borderRadius:10,fontSize:13,fontWeight:700,border:'none',cursor:'pointer',
                background: viewRound===round ? '#6d28d9' : '#1a1a24',
                color: viewRound===round ? 'white' : '#5a5a6a',
                transition:'all 0.15s'
              }}>
                Round {round}
              </button>
            ))}
          </div>
        )}

        {/* Big result cards */}
        <div style={{display:'flex',gap:12,justifyContent:'center',marginBottom:28}}>
          <div style={{background:'#13131a',border:'1px solid #1e2e1e',borderRadius:16,padding:'18px 28px',textAlign:'center',flex:1}}>
            <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.1em',color:'#3a5a3a',marginBottom:6}}>Best Single</div>
            <div style={{fontSize:32,fontWeight:900,color:'#4ade80',letterSpacing:'-0.03em',fontFamily:'monospace'}}>{bestStr}</div>
          </div>
          <div style={{background:'#13131a',border:'1px solid #2a1e4a',borderRadius:16,padding:'18px 28px',textAlign:'center',flex:1}}>
            <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.1em',color:'#4a3a6a',marginBottom:6}}>Ao5</div>
            <div style={{fontSize:32,fontWeight:900,color:isDNF?'#ef4444':'#a78bfa',letterSpacing:'-0.03em',fontFamily:'monospace'}}>{ao5Str}</div>
          </div>
        </div>

        {/* Printable scoresheet */}
        <div ref={scoresheetRef} className="ss-export" style={{background:'#fff',color:'#000',borderRadius:12,overflow:'hidden',marginBottom:16,padding:'24px',fontFamily:'Arial,sans-serif'}}>
          {/* Competition name */}
          <div style={{textAlign:'center',fontWeight:700,fontSize:20,marginBottom:16,color:'#000'}}>
            {meta.competition||'Cubing at Home'}
          </div>

          {/* Event / Round */}
          <table style={{width:'100%',borderCollapse:'collapse',marginBottom:6}}>
            <thead>
              <tr>
                <th style={{border:'none',textAlign:'left',fontWeight:400,fontSize:12,paddingBottom:2,color:'#000'}}>Event</th>
                <th style={{border:'none',textAlign:'center',fontWeight:400,fontSize:12,paddingBottom:2,color:'#000',width:64}}>Round</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td style={{border:'1px solid #000',padding:'6px 10px',fontWeight:700,fontSize:14,color:'#000'}}>3x3x3 Cube</td>
                <td style={{border:'1px solid #000',padding:'6px 10px',textAlign:'center',fontWeight:700,fontSize:14,color:'#000'}}>{viewRound}</td>
              </tr>
            </tbody>
          </table>

          {/* Name */}
          <table style={{width:'100%',borderCollapse:'collapse',marginBottom:14}}>
            <thead>
              <tr>
                <th style={{border:'none',textAlign:'left',fontWeight:400,fontSize:12,paddingBottom:2,color:'#000'}}>Name</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td style={{border:'1px solid #000',padding:'6px 10px',fontWeight:700,fontSize:14,color:'#000'}}>{meta.name||'—'}</td>
              </tr>
            </tbody>
          </table>

          {/* Results */}
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
            <thead>
              <tr style={{background:'#f0f0f0'}}>
                <th style={{border:'1px solid #000',padding:'6px 8px',textAlign:'center',color:'#000',width:28}}>#</th>
                <th style={{border:'1px solid #000',padding:'6px 8px',textAlign:'center',color:'#000'}}>Result</th>
                <th style={{border:'1px solid #000',padding:'6px 8px',textAlign:'center',color:'#000',width:40}}>Comp</th>
              </tr>
            </thead>
            <tbody>
              {displayResults.map((r,i)=>{
                const dropped=droppedIdxs.has(i);
                const best=i===bestIdx;
                return (
                  <tr key={i} style={{background:'#fff'}}>
                    <td style={{border:'1px solid #000',padding:'8px',textAlign:'center',fontWeight:700,fontSize:16,color:'#000'}}>{i+1}</td>
                    <td style={{border:'1px solid #000',padding:'8px',textAlign:'center',fontFamily:'monospace',fontWeight:700,color:'#000'}}>
                      {dropped ? `(${fmtResult(r)})` : fmtResult(r)}
                    </td>
                    <td style={{border:'1px solid #000',padding:'8px',textAlign:'center',fontFamily:'Georgia,serif',fontStyle:'italic',fontWeight:700,fontSize:13,color:'#222'}}>
                      {(meta.name||'?')[0].toUpperCase()}
                    </td>
                  </tr>
                );
              })}
            </tbody>
            <tfoot>
              <tr style={{background:'#f0f0f0',fontWeight:700}}>
                <td style={{border:'1px solid #000',padding:'6px 10px',fontSize:12,color:'#000'}}>Best: {bestStr}</td>
                <td colSpan={2} style={{border:'1px solid #000',padding:'6px 10px',fontSize:12,textAlign:'right',color:'#000'}}>Ao5: {ao5Str}</td>
              </tr>
            </tfoot>
          </table>
        </div>

        {/* Actions */}
        <div style={{display:'flex',gap:10,justifyContent:'center',flexWrap:'wrap',marginBottom:24}}>
          <button onClick={copyText}
            style={{padding:'10px 20px',borderRadius:10,background:'#1a1a24',border:'1px solid #252534',color:'#c0c0d0',fontSize:13,fontWeight:600,cursor:'pointer'}}>
            {copied?'✓ Copied!':'📋 Copy as Text'}
          </button>
          <button onClick={downloadImage} disabled={downloading}
            style={{padding:'10px 20px',borderRadius:10,background:'#1a1a24',border:'1px solid #252534',color:'#c0c0d0',fontSize:13,fontWeight:600,cursor:downloading?'default':'pointer',opacity:downloading?0.5:1}}>
            {downloading?'Generating…':'⬇ Download Scoresheet'}
          </button>
        </div>

        <div style={{textAlign:'center',display:'flex',gap:12,justifyContent:'center',flexWrap:'wrap'}}>
          {currentRound < totalRounds && (
            <button onClick={onNextRound}
              style={{padding:'14px 36px',borderRadius:14,background:'#6d28d9',color:'white',fontSize:15,fontWeight:700,cursor:'pointer',border:'none'}}>
              Start Round {currentRound + 1} →
            </button>
          )}
          <button onClick={onNewSession}
            style={{padding:'14px 36px',borderRadius:14,background:'#1a1a24',color:'#c0c0d0',fontSize:15,fontWeight:700,cursor:'pointer',border:'1px solid #252534'}}>
            New Session
          </button>
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// MAIN APP
// ─────────────────────────────────────────────────────────────────────────────
function App() {
  // ── State ──
  const [phase, setPhase]           = useState('idle');
  const [scramble, setScramble]     = useState('');
  const [results, setResults]       = useState([]);
  const [meta, setMeta]             = useState({name:'',competition:'',round:'1'});
  const [setupName, setSetupName]   = useState('');
  const [setupRounds, setSetupRounds] = useState(1);
  const [currentRound, setCurrentRound] = useState(1);
  const [totalRounds, setTotalRounds]   = useState(1);
  const [roundHistory, setRoundHistory] = useState([]); // [{round, results}]
  const [inspElapsed, setInspElapsed] = useState(0);
  const [inspWarning, setInspWarning]     = useState(null); // null | '+2'
  const [penalty, setPenalty]       = useState('none');
  const [timeInput, setTimeInput]   = useState('');
  const [timeError, setTimeError]   = useState(false);
  const [solveSigned, setSolveSigned] = useState(false);

  // ── Refs (for use inside async callbacks) ──
  const resultsRef     = useRef([]);
  const scrambleRef    = useRef('');
  const inspStartRef   = useRef(null);
  const inspPenRef     = useRef(null);   // '+2' | 'DNF' | null — mirrors inspWarning + auto-DNF
  const ann12Ref       = useRef(false);
  const ann8Ref        = useRef(false);
  const waitTimerRef   = useRef(null);
  const inspIntervalRef= useRef(null);

  // ── Sync refs with state ──
  function setResultsSync(r) { resultsRef.current=r; setResults(r); }
  function setScrambleSync(s) { scrambleRef.current=s; setScramble(s); }

  // ── Effects ──
  useEffect(()=>()=>{ clearTimeout(waitTimerRef.current); clearInterval(inspIntervalRef.current); }, []);

  // ── Actions ──
  function startSession() {
    Audio.init();
    const name = setupName.trim() || 'Competitor';
    const rounds = Math.max(1, parseInt(setupRounds) || 1);
    setTotalRounds(rounds);
    setCurrentRound(1);
    setMeta(m => ({...m, name, round:'1'}));
    const sc = generateScramble();
    setResultsSync([]);
    setScrambleSync(sc);
    setPhase('scrambling');
    setPenalty('none');
    setInspWarning(null);
    setSigned(false);
  }

  function startNextRound(nextRound) {
    setCurrentRound(nextRound);
    setMeta(m => ({...m, round: String(nextRound)}));
    const sc = generateScramble();
    setResultsSync([]);
    setScrambleSync(sc);
    setPhase('scrambling');
    setPenalty('none');
    setInspWarning(null);
    setSigned(false);
  }

  function doneScrambling() {
    setPhase('waiting-pickup');
    const delay = 10000 + Math.random() * 20000; // 10–30s
    waitTimerRef.current = setTimeout(() => setPhase('receive-cube'), delay);
  }

  function beginInspection() {
    inspStartRef.current = Date.now();
    inspPenRef.current   = null;
    ann12Ref.current     = false;
    ann8Ref.current      = false;
    setInspElapsed(0);
    setInspWarning(null);
    setPhase('inspection');

    inspIntervalRef.current = setInterval(()=>{
      const elapsed = Date.now() - inspStartRef.current;
      setInspElapsed(elapsed);

      if (!ann8Ref.current && elapsed >= 8000) {
        ann8Ref.current = true;
        Audio.announce('8 seconds');
      }
      if (!ann12Ref.current && elapsed >= 12000) {
        ann12Ref.current = true;
        Audio.announce('12 seconds');
      }
      if (!inspPenRef.current && elapsed >= 15000) {
        inspPenRef.current = '+2';
        setInspWarning('+2');
      }
      if (elapsed >= 17000) {
        // Inspection DNF — auto-submit and skip to next
        clearInterval(inspIntervalRef.current);
        inspPenRef.current = 'DNF';
        const r = { ms: 0, penalty: 'DNF', scramble: scrambleRef.current };
        addResult(r);
      }
    }, 80);
  }

  function stopInspection() {
    clearInterval(inspIntervalRef.current);
    const pen = inspPenRef.current; // '+2' or null
    setPenalty(pen==='+2'?'+2':'none');
    setPhase('solving');
  }

  function doneSolving() {
    setTimeInput('');
    setTimeError(false);
    setPhase('entering-time');
  }

  function autoFormatTime(v) {
    const digits = v.replace(/[^0-9]/g, '');
    if (digits.length >= 2 && !v.includes('.') && !v.includes(':')) {
      const dec = digits.slice(-2);
      const secs = digits.slice(0, -2) || '0';
      return secs + '.' + dec;
    }
    return v;
  }

  function submitResult() {
    if (penalty==='DNF') {
      addResult({ ms: 0, penalty: 'DNF', scramble: scrambleRef.current });
      return;
    }
    const formatted = autoFormatTime(timeInput);
    setTimeInput(formatted);
    const ms = parseTime(formatted);
    if (!ms || ms <= 0) { setTimeError(true); return; }
    setTimeError(false);
    addResult({ ms, penalty, scramble: scrambleRef.current });
  }

  function addResult(result) {
    const newResults = [...resultsRef.current, result];
    setResultsSync(newResults);
    setSolveSigned(false);
    setPhase('signing');
  }

  function proceedFromSigning() {
    const newResults = resultsRef.current;
    if (newResults.length >= 5) {
      setRoundHistory(prev => [...prev, {round: currentRound, results: newResults}]);
      setPhase('complete');
      return;
    }
    setPhase('waiting-next');
    const delay = 10000 + Math.random() * 20000; // 10–30s
    waitTimerRef.current = setTimeout(()=>{
      const sc = generateScramble();
      setScrambleSync(sc);
      setPenalty('none');
      setInspWarning(null);
      setPhase('scrambling');
    }, delay);
  }

  function handleNewSession() {
    if (!confirm('Start a new session? All results will be cleared.')) return;
    clearTimeout(waitTimerRef.current);
    clearInterval(inspIntervalRef.current);
    setPhase('idle');
    setResultsSync([]);
    setScrambleSync('');
    setRoundHistory([]);
    setPenalty('none');
    setInspWarning(null);
  }

  // ── IDLE SCREEN ──
  if (phase==='idle') {
    const canStart = setupName.trim().length > 0;
    return (
      <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:24}}>
        <div style={{width:'100%',maxWidth:360}}>
          <div style={{textAlign:'center',marginBottom:32}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:16,marginBottom:20}}>
              <img
                src="Caiden Cube Logo black.png"
                alt="Caiden Lee"
                style={{width:56,height:56,objectFit:'contain'}}
              />
              <span style={{fontSize:22,color:'#3a3a52',fontWeight:700}}>×</span>
              <img
                src="https://assets.worldcubeassociation.org/assets/6566d6e/assets/WCA%20Logo-4ef000323c6a9a407cdf07647a31c0ef4dc847f2352a9a136ef3e809e95bdeab.svg"
                alt="WCA"
                style={{width:56,height:56,objectFit:'contain'}}
              />
            </div>
            <div style={{fontSize:36,fontWeight:900,color:'#e8e8e8',letterSpacing:'-0.04em'}}>WCA Comp Sim</div>
          </div>

          <div style={{display:'flex',flexDirection:'column',gap:14,marginBottom:28}}>
            <div>
              <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.1em',color:'#9a9aaa',marginBottom:7}}>Your Name</div>
              <input
                autoFocus
                type="text"
                placeholder="Your name"
                value={setupName}
                onChange={e=>setSetupName(e.target.value)}
                onKeyDown={e=>{ if(e.key==='Enter' && canStart) startSession(); }}
                style={{
                  width:'100%',padding:'12px 16px',
                  background:'#13131a',border:'1px solid #252534',borderRadius:12,
                  fontSize:15,color:'#e8e8e8',outline:'none',
                  fontFamily:'inherit',
                }}
              />
            </div>
            <div>
              <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.1em',color:'#9a9aaa',marginBottom:7}}>Competition Name</div>
              <input
                type="text"
                placeholder="Competition name"
                value={meta.competition}
                onChange={e=>setMeta(m=>({...m,competition:e.target.value}))}
                style={{
                  width:'100%',padding:'12px 16px',
                  background:'#13131a',border:'1px solid #252534',borderRadius:12,
                  fontSize:15,color:'#e8e8e8',outline:'none',
                  fontFamily:'inherit',
                }}
              />
            </div>
            <div>
              <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.1em',color:'#4a4a5a',marginBottom:7}}>Number of Rounds</div>
              <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                {[1,2,3,4].map(n=>(
                  <button key={n} onClick={()=>setSetupRounds(n)}
                    style={{
                      flex:1,padding:'11px 0',borderRadius:10,fontSize:15,fontWeight:700,border:'none',cursor:'pointer',
                      background: setupRounds===n ? '#6d28d9' : '#1a1a24',
                      color: setupRounds===n ? 'white' : '#4a4a5a',
                      transition:'all 0.12s',
                    }}>
                    {n}
                  </button>
                ))}
              </div>
            </div>
          </div>

          <button
            onClick={startSession}
            disabled={!canStart}
            style={{
              width:'100%',padding:'15px 0',background:canStart?'#6d28d9':'#1a1a24',
              color:canStart?'white':'#3a3a4a',borderRadius:14,fontSize:15,fontWeight:700,
              border:canStart?'none':'1px solid #252534',cursor:canStart?'pointer':'default',
              transition:'all 0.15s',
            }}>
            Start Competition →
          </button>
        </div>
      </div>
    );
  }

  // ── COMPLETE ──
  if (phase==='complete') {
    return <SessionSummary
      results={results}
      meta={meta}
      currentRound={currentRound}
      totalRounds={totalRounds}
      roundHistory={roundHistory}
      onNewSession={handleNewSession}
      onNextRound={()=>startNextRound(currentRound+1)}
    />;
  }

  // ── SESSION SCREEN ──
  return (
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column'}}>

      {/* Header */}
      <header style={{
        position:'sticky',top:0,zIndex:50,
        background:'rgba(15,15,19,0.95)',backdropFilter:'blur(12px)',
        borderBottom:'1px solid rgba(255,255,255,0.05)',
        display:'flex',alignItems:'center',justifyContent:'space-between',
        padding:'0 20px',height:52,flexShrink:0
      }}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <img src="Caiden Cube Logo black.png" alt="Caiden Lee" style={{width:24,height:24,objectFit:'contain'}}/>
          <span style={{fontSize:13,color:'#3a3a52',fontWeight:700}}>×</span>
          <img src="https://assets.worldcubeassociation.org/assets/6566d6e/assets/WCA%20Logo-4ef000323c6a9a407cdf07647a31c0ef4dc847f2352a9a136ef3e809e95bdeab.svg" alt="WCA" style={{width:24,height:24,objectFit:'contain'}}/>
          <span style={{fontWeight:800,fontSize:15,color:'#e8e8e8',letterSpacing:'-0.02em',marginLeft:6}}>WCA Comp Sim</span>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <button onClick={()=>{
            clearTimeout(waitTimerRef.current);
            clearInterval(inspIntervalRef.current);
            const fakeResults = [
              {ms:629,penalty:'none',scramble:'R U R\' U\''},
              {ms:793,penalty:'+2',scramble:'F R U\''},
              {ms:540,penalty:'none',scramble:'L\' U L'},
              {ms:638,penalty:'none',scramble:'R\' F R'},
              {ms:573,penalty:'none',scramble:'U R U\''},
            ];
            setResultsSync(fakeResults);
            setRoundHistory(prev => [...prev, {round: currentRound, results: fakeResults}]);
            setPhase('complete');
          }} style={{fontSize:11,color:'#fbbf24',background:'#1a1500',border:'1px solid #fbbf2440',borderRadius:8,padding:'5px 12px',cursor:'pointer',fontWeight:600}}>
            ⚡ Skip to End
          </button>
          <button onClick={handleNewSession}
            style={{fontSize:11,color:'white',background:'#dc2626',border:'none',borderRadius:8,padding:'5px 12px',cursor:'pointer',fontWeight:600}}>
            Stop Comp Sim
          </button>
        </div>
      </header>

      {/* Body: main + sidebar */}
      <div style={{display:'flex',flex:1,overflow:'hidden'}}>

        {/* Main content */}
        <div style={{flex:1,overflowY:'auto',padding:'24px 20px',display:'flex',flexDirection:'column'}}>

          {/* ── ENTERING TIME (two-column) ── */}
          {phase==='entering-time' && (
            <div style={{display:'flex',gap:48,alignItems:'center',justifyContent:'center',width:'100%',flex:1}}>
              <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',width:360}}>
                <div style={{width:'100%',textAlign:'center'}}>
                  <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.12em',color:'#4a4a5a',marginBottom:20}}>
                    Enter Your Time
                  </div>
                  <input
                    autoFocus
                    type="text"
                    inputMode="decimal"
                    placeholder=""
                    value={timeInput}
                    disabled={penalty==='DNF'}
                    onChange={e=>{
                      let v = e.target.value.replace(/[^0-9.:]/g,'');
                      setTimeInput(v);
                      setTimeError(false);
                    }}
                    onBlur={e=>{
                      let v = timeInput.replace(/[^0-9]/g,'');
                      if (v.length >= 2 && !timeInput.includes('.') && !timeInput.includes(':')) {
                        const dec = v.slice(-2);
                        const secs = v.slice(0,-2) || '0';
                        setTimeInput(secs + '.' + dec);
                      }
                    }}
                    onKeyDown={e=>{ if(e.key==='Enter') submitResult(); }}
                    style={{
                      width:'100%',padding:'16px 20px',
                      background: penalty==='DNF'?'#1a1016':'#13131a',
                      border:`2px solid ${timeError?'#ef4444':penalty==='DNF'?'#3a1a1a':'#252534'}`,
                      borderRadius:14,fontSize:36,fontFamily:'monospace',textAlign:'center',
                      color:penalty==='DNF'?'#4a2a2a':'#e8e8e8',outline:'none',marginBottom:20,
                      transition:'border-color 0.15s'
                    }}
                  />
                  {timeError && (
                    <div style={{fontSize:12,color:'#ef4444',marginTop:-14,marginBottom:14}}>Enter a valid time</div>
                  )}
                  <div style={{display:'flex',gap:10,justifyContent:'center',marginBottom:24}}>
                    {['none','+2','DNF'].map(p=>(
                      <button key={p} onClick={()=>{ setPenalty(p); setTimeError(false); }}
                        style={{
                          padding:'9px 20px',borderRadius:10,fontSize:13,fontWeight:700,border:'none',cursor:'pointer',
                          background: penalty===p
                            ? p==='DNF'?'#dc2626':p==='+2'?'#ea580c':'#16a34a'
                            : '#1a1a24',
                          color: penalty===p?'white':'#5a5a6a',
                          transition:'all 0.12s'
                        }}>
                        {p==='none'?'No Penalty':p}
                      </button>
                    ))}
                  </div>
                  <button onClick={submitResult}
                    style={{width:'100%',padding:'15px 0',background:'#6d28d9',color:'white',borderRadius:14,fontSize:15,fontWeight:700,border:'none',cursor:'pointer'}}>
                    Submit Result →
                  </button>
                </div>
              </div>
              <div style={{width:300,flexShrink:0}}>
                <LiveScoresheet results={results} completedCount={results.length} meta={meta}/>
              </div>
            </div>
          )}

          <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',maxWidth:480,margin:'0 auto',width:'100%'}}>

            {/* ── SCRAMBLING ── */}
            {phase==='scrambling' && (
              <div style={{width:'100%',textAlign:'center'}}>
                <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.12em',color:'#4a4a5a',marginBottom:14}}>
                  Scramble {results.length+1}
                </div>
                <div style={{background:'#13131a',border:'1px solid #1e1e2a',borderRadius:14,padding:'16px 20px',marginBottom:20,textAlign:'left'}}>
                  <div style={{fontFamily:'monospace',fontSize:16,color:'#e8e8e8',lineHeight:1.7,letterSpacing:'0.02em',wordBreak:'break-word'}}>
                    {scramble}
                  </div>
                </div>
                <div style={{display:'flex',justifyContent:'center',marginBottom:28}}>
                  <CubeNet scramble={scramble} cell={20}/>
                </div>
                <button onClick={doneScrambling}
                  style={{width:'100%',padding:'15px 0',background:'#6d28d9',color:'white',borderRadius:14,fontSize:15,fontWeight:700,border:'none',cursor:'pointer'}}>
                  Done Scrambling →
                </button>
              </div>
            )}

            {/* ── WAITING FOR CUBE ── */}
            {phase==='waiting-pickup' && (
              <div style={{textAlign:'center'}}>
                <div style={{fontSize:36,fontWeight:800,color:'#e8e8e8',letterSpacing:'-0.03em',whiteSpace:'nowrap'}}>
                  Waiting to receive cube<WaitingDots/>
                </div>
              </div>
            )}

            {/* ── RECEIVE CUBE ── */}
            {phase==='receive-cube' && (
              <div style={{textAlign:'center',width:'100%'}}>
                <div style={{display:'flex',justifyContent:'center',marginBottom:20}}>
                  <svg width="90" height="100" viewBox="0 0 90 100" fill="none" xmlns="http://www.w3.org/2000/svg" style={{transform:'rotate(180deg)'}}>
                    {/* Drop shadow */}
                    <ellipse cx="45" cy="97" rx="28" ry="4" fill="rgba(0,0,0,0.3)"/>
                    {/* Main body */}
                    <path d="M10 10 Q10 6 14 6 L76 6 Q80 6 80 10 L74 82 Q74 86 70 86 L20 86 Q16 86 16 82 Z" fill="#1c1c2e"/>
                    {/* Left gloss panel */}
                    <path d="M14 6 Q10 6 10 10 L16 82 Q16 86 20 86 L26 86 L20 6 Z" fill="#25253a"/>
                    {/* Top gloss strip */}
                    <path d="M14 6 Q10 6 10 10 L11 20 L79 20 L80 10 Q80 6 76 6 Z" fill="#2e2e48"/>
                    {/* Sheen highlight */}
                    <path d="M16 8 L22 8 L18 30 L12 30 Z" fill="rgba(255,255,255,0.07)" rx="2"/>
                    {/* Bottom metallic rim */}
                    <path d="M16 82 Q16 86 20 86 L70 86 Q74 86 74 82 L75 90 Q75 93 71 93 L19 93 Q15 93 15 90 Z" fill="#666"/>
                    <path d="M15 90 Q15 93 19 93 L71 93 Q75 93 75 90 L75 92 Q75 94 71 94 L19 94 Q15 94 15 92 Z" fill="#999"/>
                    {/* Cubicle logo */}
                    <image href="TheCubicle Logo Transparent.png" x="22" y="28" width="46" height="32" style={{transform:'rotate(180deg)',transformOrigin:'45px 44px'}}/>
                  </svg>
                </div>
                <div style={{fontSize:22,fontWeight:800,color:'#e8e8e8',marginBottom:32,letterSpacing:'-0.02em'}}>
                  Received Cube
                </div>
                <button onClick={beginInspection}
                  style={{width:'100%',padding:'15px 0',background:'#6d28d9',color:'white',borderRadius:14,fontSize:15,fontWeight:700,border:'none',cursor:'pointer'}}>
                  Start Inspection →
                </button>
              </div>
            )}

            {/* ── INSPECTION ── */}
            {phase==='inspection' && (
              <div style={{textAlign:'center',width:'100%'}}>
                <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.12em',color:'#4a4a5a',marginBottom:20}}>
                  Inspection
                </div>
                <div
                  className={inspElapsed >= 12000 && !inspWarning ? 'urgent' : ''}
                  style={{
                    fontSize:96,fontWeight:900,letterSpacing:'-0.05em',marginBottom:36,fontFamily:'monospace',lineHeight:1,
                    color: inspWarning==='+2' ? '#f97316'
                         : inspElapsed>=12000 ? '#ef4444'
                         : inspElapsed>=8000  ? '#fb923c'
                         : '#e8e8e8'
                  }}>
                  {inspWarning==='+2' ? '+2' : Math.min(15, Math.ceil(inspElapsed/1000)) || 1}
                </div>
                {inspWarning==='+2' && (
                  <div style={{fontSize:13,color:'#f97316',fontWeight:700,marginBottom:16}}>
                    Inspection exceeded — +2 penalty will apply
                  </div>
                )}
                <button onClick={stopInspection}
                  style={{width:'100%',padding:'15px 0',background:'#16a34a',color:'white',borderRadius:14,fontSize:15,fontWeight:700,border:'none',cursor:'pointer'}}>
                  I've Started Solving →
                </button>
              </div>
            )}

            {/* ── SOLVING ── */}
            {phase==='solving' && (
              <div style={{textAlign:'center',width:'100%'}}>
                <div style={{fontSize:52,fontWeight:900,letterSpacing:'-0.03em',color:'#e8e8e8',marginBottom:20}}>
                  Solving
                </div>
                {penalty==='+2' && (
                  <div style={{fontSize:13,color:'#f97316',fontWeight:700,marginBottom:12}}>
                    +2 sec inspection penalty pending
                  </div>
                )}
                <button onClick={doneSolving}
                  style={{width:'100%',padding:'15px 0',background:'#16a34a',color:'white',borderRadius:14,fontSize:15,fontWeight:700,border:'none',cursor:'pointer'}}>
                  Finished Solve →
                </button>
              </div>
            )}

            {/* ── ENTERING TIME ── */}

            {/* ── SIGNING ── */}
            {phase==='signing' && (
              <div style={{width:'100%',display:'flex',flexDirection:'column',alignItems:'center',gap:20}}>
                <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.12em',color:'#4a4a5a',marginBottom:4}}>
                  Sign Your Scorecard
                </div>

                {/* Centered WCA scorecard */}
                <div style={{background:'#fff',borderRadius:14,padding:'20px 18px',fontFamily:'Arial,sans-serif',color:'#000',width:'100%',maxWidth:320,boxShadow:'0 4px 32px rgba(0,0,0,0.5)'}}>
                  {/* Competition name */}
                  <div style={{textAlign:'center',fontWeight:700,fontSize:15,marginBottom:14}}>
                    {meta.competition || 'Cubing at Home'}
                  </div>

                  {/* Event / Round */}
                  <table style={{width:'100%',borderCollapse:'collapse',marginBottom:6}}>
                    <thead>
                      <tr>
                        <th style={{border:'1px solid #000',padding:'5px 8px',fontSize:10,fontWeight:400,textAlign:'left'}}>Event</th>
                        <th style={{border:'1px solid #000',padding:'5px 8px',fontSize:10,fontWeight:400,textAlign:'center'}}>Round</th>
                      </tr>
                    </thead>
                    <tbody>
                      <tr>
                        <td style={{border:'1px solid #000',padding:'6px 8px',fontWeight:700,fontSize:13}}>3x3x3 Cube</td>
                        <td style={{border:'1px solid #000',padding:'6px 8px',textAlign:'center',fontWeight:700,fontSize:13,width:48}}>{meta.round||'1'}</td>
                      </tr>
                    </tbody>
                  </table>

                  {/* Name */}
                  <table style={{width:'100%',borderCollapse:'collapse',marginBottom:14}}>
                    <thead>
                      <tr>
                        <th style={{border:'1px solid #000',padding:'5px 8px',fontSize:10,fontWeight:400,textAlign:'left'}}>Name</th>
                      </tr>
                    </thead>
                    <tbody>
                      <tr>
                        <td style={{border:'1px solid #000',padding:'6px 8px',fontWeight:700,fontSize:13}}>{meta.name||'—'}</td>
                      </tr>
                    </tbody>
                  </table>

                  {/* Results table */}
                  <table style={{width:'100%',borderCollapse:'collapse'}}>
                    <thead>
                      <tr style={{background:'#f0f0f0'}}>
                        <th style={{border:'1px solid #000',padding:'6px 8px',fontSize:11,width:22}}>#</th>
                        <th style={{border:'1px solid #000',padding:'6px 8px',fontSize:11,textAlign:'center'}}>Result</th>
                        <th style={{border:'1px solid #000',padding:'6px 8px',fontSize:11,width:44,textAlign:'center'}}>Comp</th>
                      </tr>
                    </thead>
                    <tbody>
                      {[0,1,2,3,4].map(i=>{
                        const r = results[i];
                        const isCurrentSolve = i === results.length - 1;
                        const { droppedIdxs } = calcAo5(results.length===5 ? results : []);
                        const dropped = results.length===5 && droppedIdxs && droppedIdxs.has(i);
                        return (
                          <tr key={i} style={{background: i%2===0?'#fff':'#fafafa'}}>
                            <td style={{border:'1px solid #000',padding:'6px 8px',fontWeight:700,fontSize:14}}>{i+1}</td>
                            <td style={{border:'1px solid #000',padding:'6px 8px',textAlign:'center',fontFamily:'monospace',fontWeight:700,fontSize:13,
                              textDecoration: dropped?'line-through':'none',
                              opacity: dropped?0.4:1
                            }}>
                              {r ? fmtResult(r) : ''}
                            </td>
                            <td style={{border:'1px solid #000',padding:'6px 8px',textAlign:'center'}}>
                              {isCurrentSolve ? (
                                <div
                                  onClick={()=>setSolveSigned(true)}
                                  style={{
                                    width:22,height:22,border:'2px solid #333',borderRadius:4,
                                    margin:'0 auto',cursor:'pointer',
                                    background: solveSigned ? '#1a1aff' : 'transparent',
                                    display:'flex',alignItems:'center',justifyContent:'center',
                                    transition:'background 0.15s'
                                  }}
                                >
                                  {solveSigned && (
                                    <span style={{fontSize:11,fontWeight:700,color:'white',fontFamily:'Georgia,serif',fontStyle:'italic'}}>
                                      {(meta.name||'?')[0].toUpperCase()}
                                    </span>
                                  )}
                                </div>
                              ) : (
                                r ? <span style={{fontSize:11,fontWeight:700,color:'#555',fontFamily:'Georgia,serif',fontStyle:'italic'}}>{(meta.name||'?')[0].toUpperCase()}</span> : ''
                              )}
                            </td>
                          </tr>
                        );
                      })}
                      <tr>
                        <td style={{border:'1px solid #000',padding:'6px 8px',fontWeight:700,fontSize:14,color:'#888'}}>—</td>
                        <td style={{border:'1px solid #000',padding:'6px 8px'}}></td>
                        <td style={{border:'1px solid #000',padding:'6px 8px'}}></td>
                      </tr>
                    </tbody>
                  </table>
                  <div style={{fontSize:10,color:'#888',marginTop:6,textAlign:'right'}}>Extra attempt</div>
                </div>

                {/* Proceed button — appears after signing */}
                {solveSigned && (
                  <button
                    onClick={proceedFromSigning}
                    style={{
                      padding:'14px 36px',
                      background: results.length >= 5 ? '#059669' : '#2563eb',
                      color:'white',borderRadius:14,fontSize:15,fontWeight:700,
                      border:'none',cursor:'pointer',
                      animation:'fadeIn 0.2s ease'
                    }}
                  >
                    {results.length >= 5 ? 'View Results →' : `Solve ${results.length + 1} →`}
                  </button>
                )}

                {!solveSigned && (
                  <p style={{fontSize:12,color:'#3a3a4a',textAlign:'center',marginTop:4}}>
                    Tap the Comp box on your solve row to sign
                  </p>
                )}
              </div>
            )}

            {/* ── WAITING FOR NEXT ── */}
            {phase==='waiting-next' && (
              <div style={{textAlign:'center'}}>
                <div style={{fontSize:36,fontWeight:800,color:'#e8e8e8',letterSpacing:'-0.03em',whiteSpace:'nowrap'}}>
                  Preparing next scramble<WaitingDots/>
                </div>
              </div>
            )}

          </div>
        </div>

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
