<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZBLS Algorithm Sheet — Caiden Lee</title>
<link rel="icon" type="image/png" href="Caiden Cube Logo black.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #16161a; --bg2: #1e1e24; --bg3: #26262e; --bg4: #2e2e38;
    --border: rgba(255,255,255,0.08); --text: #f0f0f0; --muted: #8a8a9a;
    --accent: #7c6ff7; --white: #ffffff;
  }
  html, body { min-height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }

  /* HEADER */
  header { display: flex; align-items: center; gap: 1rem; padding: 0.75rem 1.5rem; border-bottom: 1px solid var(--border); background: rgba(22,22,26,0.97); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; }
  .header-tag { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent); background: rgba(124,111,247,0.12); border: 1px solid rgba(124,111,247,0.2); padding: 2px 8px; border-radius: 50px; white-space: nowrap; }
  .spacer { flex: 1; }
  .header-title { font-size: 20px; font-weight: 700; color: var(--white); position: absolute; left: 50%; transform: translateX(-50%); }
  .open-ext { display: inline-flex; align-items: center; gap: 6px; text-decoration: none; color: var(--muted); font-size: 12px; font-weight: 500; padding: 0.4rem 0.9rem; border-radius: 50px; border: 1px solid var(--border); background: var(--bg2); transition: all 0.2s; white-space: nowrap; }
  .open-ext:hover { color: var(--white); border-color: rgba(124,111,247,0.4); background: rgba(124,111,247,0.08); }

  /* FILTER BAR */
  .filter-bar { display: flex; align-items: center; gap: 8px; padding: 0.75rem 1.5rem; flex-wrap: wrap; border-bottom: 1px solid var(--border); background: var(--bg); position: sticky; top: 53px; z-index: 99; }
  .filter-btn { font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500; padding: 5px 14px; border-radius: 50px; border: 1px solid var(--border); background: var(--bg2); color: var(--muted); cursor: pointer; transition: all 0.15s; }
  .filter-btn:hover { color: var(--white); border-color: rgba(124,111,247,0.4); }
  .filter-btn.active { background: rgba(124,111,247,0.15); border-color: rgba(124,111,247,0.5); color: var(--white); }
  .case-count { font-size: 11px; color: var(--muted); margin-left: auto; }

  /* MAIN */
  .main { padding: 1.5rem; max-width: 1400px; margin: 0 auto; }

  /* SECTION HEADERS */
  .section-header { display: flex; align-items: center; gap: 12px; margin: 2rem 0 1rem; }
  .section-header:first-child { margin-top: 0; }
  .section-label { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); }
  .section-line { flex: 1; height: 1px; background: var(--border); }
  .section-desc { font-size: 11px; color: var(--muted); }

  /* CARD GRID */
  .case-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }

  /* CASE CARD */
  .case-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; cursor: pointer; transition: all 0.2s; display: flex; flex-direction: column; align-items: center; padding: 14px 12px; gap: 8px; }
  .case-card:hover { border-color: rgba(124,111,247,0.4); background: rgba(124,111,247,0.05); transform: translateY(-1px); }
  .case-img { width: 72px; height: 72px; object-fit: contain; }
  .case-num { font-size: 15px; font-weight: 700; color: var(--white); }
  .case-cat { font-size: 10px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--accent); }
  .case-sub-count { font-size: 10px; color: var(--muted); }
  .case-card-expand { font-size: 10px; color: var(--muted); display: flex; align-items: center; gap: 3px; margin-top: 2px; }

  /* MODAL */
  .modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; backdrop-filter: blur(4px); overflow-y: auto; padding: 2rem 1rem; }
  .modal-backdrop.open { display: flex; align-items: flex-start; justify-content: center; }
  .modal { background: var(--bg2); border: 1px solid var(--border); border-radius: 18px; width: 100%; max-width: 1200px; overflow: hidden; box-shadow: 0 24px 80px rgba(0,0,0,0.6); }
  .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border); }
  .modal-title { font-size: 20px; font-weight: 700; color: var(--white); }
  .modal-subtitle { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .modal-close { background: var(--bg3); border: 1px solid var(--border); border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--muted); font-size: 16px; transition: all 0.2s; flex-shrink: 0; }
  .modal-close:hover { color: var(--white); border-color: rgba(124,111,247,0.4); }
  .modal-body { padding: 1.25rem 1.5rem; }

  /* SUB-CASE GRID */
  .subcase-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
  .subcase-card { background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .subcase-top { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-bottom: 1px solid var(--border); }
  .subcase-img { width: 56px; height: 56px; object-fit: contain; background: var(--bg4); border-radius: 6px; flex-shrink: 0; }
  .subcase-orient { font-size: 14px; font-weight: 700; color: var(--white); }
  .subcase-alg-count { font-size: 10px; color: var(--muted); margin-top: 2px; }
  .subcase-algs { padding: 8px 10px; display: flex; flex-direction: column; gap: 3px; max-height: 200px; overflow-y: auto; }
  .subcase-algs::-webkit-scrollbar { width: 3px; }
  .subcase-algs::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .alg-row { display: flex; align-items: center; gap: 6px; padding: 4px 7px; border-radius: 5px; background: var(--bg4); cursor: pointer; transition: background 0.15s; }
  .alg-row:hover { background: rgba(124,111,247,0.1); }
  .alg-text { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; color: var(--text); flex: 1; min-width: 0; word-break: break-all; line-height: 1.4; }
  .copy-icon { flex-shrink: 0; color: var(--muted); opacity: 0; transition: opacity 0.15s; }
  .alg-row:hover .copy-icon { opacity: 1; }
  .alg-row.copied .alg-text { color: var(--accent); }

  /* EDIT MODE */
  .alg-input { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; color: var(--text); flex: 1; min-width: 0; background: var(--bg2); border: 1px solid rgba(124,111,247,0.35); border-radius: 4px; padding: 3px 6px; outline: none; line-height: 1.4; }
  .alg-input:focus { border-color: var(--accent); }
  .alg-delete-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 15px; padding: 0 3px; line-height: 1; transition: color 0.15s; flex-shrink: 0; }
  .alg-delete-btn:hover { color: #f87171; }
  .add-alg-btn { width: 100%; margin-top: 4px; background: none; border: 1px dashed var(--border); border-radius: 5px; color: var(--muted); font-size: 11px; font-family: 'Inter', sans-serif; padding: 5px; cursor: pointer; transition: all 0.15s; }
  .add-alg-btn:hover { border-color: rgba(124,111,247,0.4); color: var(--accent); }
  .reset-alg-btn { background: none; border: none; color: var(--muted); font-size: 10px; font-family: 'Inter', sans-serif; cursor: pointer; padding: 0; margin-left: 4px; text-decoration: underline; transition: color 0.15s; }
  .reset-alg-btn:hover { color: var(--text); }
  .edit-on { color: #f0a500 !important; border-color: rgba(240,165,0,0.45) !important; background: rgba(240,165,0,0.06) !important; }

  /* HOME BTN */
  .home-btn { position: fixed; bottom: 1.5rem; left: 1.5rem; display: inline-flex; align-items: center; gap: 6px; text-decoration: none; color: var(--muted); font-size: 12px; font-weight: 500; padding: 0.5rem 1rem; border-radius: 50px; border: 1px solid var(--border); background: rgba(30,30,36,0.85); backdrop-filter: blur(10px); transition: all 0.2s; z-index: 1000; box-shadow: 0 4px 16px rgba(0,0,0,0.4); }
  .home-btn:hover { color: var(--white); border-color: rgba(124,111,247,0.4); background: rgba(124,111,247,0.15); }
</style>
</head>

  </button>
</header>

<div class="filter-bar">
  <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
  <button class="filter-btn" onclick="setFilter('VHLS',this)">VHLS</button>
  <button class="filter-btn" onclick="setFilter('Split',this)">Split</button>
  <button class="filter-btn" onclick="setFilter('Pair',this)">Pair</button>
  <button class="filter-btn" onclick="setFilter('SlotCorner',this)">Slot Corner</button>
  <button class="filter-btn" onclick="setFilter('SlotEdge',this)">Slot Edge</button>
  <button class="filter-btn" onclick="setFilter('SlotBoth',this)">Slot Both</button>
  <span class="case-count" id="caseCount">40 cases</span>
</div>

<div class="main" id="mainContent"></div>

<!-- Modal -->
<div class="modal-backdrop" id="modalBackdrop" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modalTitle"></div>
        <div class="modal-subtitle" id="modalSubtitle"></div>
      </div>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<a class="home-btn" href="zb.html">

  'SlotCorner': 'Slot Corner', 'SlotEdge': 'Slot Edge', 'SlotBoth': 'Slot Both'
};
const CAT_DESC = {
  'VHLS': '4 cases — Vertical-Horizontal Last Slot',
  'Split': '10 cases — Corner & edge split',
  'Pair': '10 cases — Corner & edge paired',
  'SlotCorner': '6 cases — Corner in slot, edge free',
  'SlotEdge': '6 cases — Edge in slot, corner free',
  'SlotBoth': '4 cases — Both pieces in slot'
};
const CAT_ORDER = ['VHLS','Split','Pair','SlotCorner','SlotEdge','SlotBoth'];

let activeFilter = 'all';

function setFilter(cat, btn) {
  activeFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderMain();
}

function getSubcases(cat, num) {
  const caseData = zblsMap[cat] && zblsMap[cat][String(num)];
  if (!caseData) return [];
  const csvAlgs = SUBCASE_ALGS[num] || [];
  const orients = Object.keys(caseData);
  return orients.map((orient, i) => ({ orient, algs: csvAlgs[i] || [] }));
}

function getOrientations(cat, num) {
  const caseData = zblsMap[cat] && zblsMap[cat][String(num)];
  if (!caseData) return [];
  return Object.keys(caseData);
}

function imgPath2(cat, num) {
  return `zbls-trainer/caseImage/ZBLS/level2/${cat}-${num}.png`;
}
function imgPath3(cat, num, orient) {
  return `zbls-trainer/caseImage/ZBLS/level3/${cat}-${num}-${orient}.png`;
}

function copyAlg(text, el) {
  navigator.clipboard.writeText(text).then(() => {
    el.classList.add('copied');
    setTimeout(() => el.classList.remove('copied'), 700);
  });
}

// --- Custom alg storage ---
function getCustomAlgs() {
  try { return JSON.parse(localStorage.getItem('zbls_custom_algs') || '{}'); } catch { return {}; }
}
function saveCustomAlgs(obj) {
  localStorage.setItem('zbls_custom_algs', JSON.stringify(obj));
}
function isEditLocked() {
  return localStorage.getItem('zbls_edit_locked') === 'true';
}
function getAlgsForOrient(caseNum, orient, fallback) {
  const key = `${caseNum}_${orient}`;
  const custom = getCustomAlgs();
  return custom[key] !== undefined ? custom[key] : fallback;
}
function saveAlgsForOrient(caseNum, orient, algs) {
  const custom = getCustomAlgs();
  custom[`${caseNum}_${orient}`] = algs;
  saveCustomAlgs(custom);
}
function resetAlgsForOrient(caseNum, orient) {
  const custom = getCustomAlgs();
  delete custom[`${caseNum}_${orient}`];
  saveCustomAlgs(custom);
  renderModal();
}
function deleteAlgFromOrient(caseNum, orient, idx, fallback) {
  const algs = [...getAlgsForOrient(caseNum, orient, fallback)];
  algs.splice(idx, 1);
  saveAlgsForOrient(caseNum, orient, algs);
  renderModal();
}
function addAlgToOrient(caseNum, orient, fallback) {
  const algs = [...getAlgsForOrient(caseNum, orient, fallback)];
  algs.push('');
  saveAlgsForOrient(caseNum, orient, algs);
  renderModal();
  // Focus the newly added input
  setTimeout(() => {
    const inputs = document.querySelectorAll(`.alg-input[data-orient="${orient}"]`);
    if (inputs.length) inputs[inputs.length - 1].focus();
  }, 20);
}
function saveAlgEdit(caseNum, orient, idx, newVal, fallback) {
  const algs = [...getAlgsForOrient(caseNum, orient, fallback)];
  algs[idx] = newVal;
  saveAlgsForOrient(caseNum, orient, algs);
}

// --- Edit mode ---
let editMode = false;
let currentModalCase = null;
let currentModalCat = null;

function toggleEditMode() {
  if (isEditLocked()) {
    const pw = prompt('Enter password to unlock editing:');
    if (pw === null) return;
    const stored = localStorage.getItem('zbls_edit_password');
    if (pw !== stored) { alert('Incorrect password.'); return; }
    localStorage.removeItem('zbls_edit_locked');
  }
  editMode = !editMode;
  updateEditBtn();
  if (currentModalCase !== null) renderModal();
}
function lockEditing() {
  // First lock: set a password
  if (!localStorage.getItem('zbls_edit_password')) {
    const pw = prompt('Set a password to unlock editing later:');
    if (!pw) return;
    const pw2 = prompt('Confirm password:');
    if (pw !== pw2) { alert('Passwords do not match.'); return; }
    localStorage.setItem('zbls_edit_password', pw);
  }
  localStorage.setItem('zbls_edit_locked', 'true');
  editMode = false;
  updateEditBtn();
  if (currentModalCase !== null) renderModal();
}
function updateEditBtn() {
  const btn = document.getElementById('editModeBtn');
  const lockBtn = document.getElementById('lockBtn');
  const exportBtn = document.getElementById('exportAlgsBtn');
  if (!btn) return;
  if (isEditLocked()) {
    btn.classList.remove('edit-on');
    btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> Unlock`;
    lockBtn.style.display = 'none';
    if (exportBtn) exportBtn.style.display = 'none';
    return;
  }
  if (editMode) {
    btn.classList.add('edit-on');
    btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> Editing…`;
    lockBtn.style.display = 'inline-flex';
    if (exportBtn) exportBtn.style.display = 'inline-flex';
  } else {
    btn.classList.remove('edit-on');
    btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> Edit Algs`;
    lockBtn.style.display = 'none';
    if (exportBtn) exportBtn.style.display = 'none';
  }
}
function exportAlgsToSource() {
  const custom = getCustomAlgs();
  const lines = ['const SUBCASE_ALGS = {'];
  for (const c of F2L_CASES) {
    const subcases = getSubcases(c.cat, c.n);
    const rows = subcases.map(({ orient, algs: def }) => {
      const algs = custom[`${c.n}_${orient}`] !== undefined ? custom[`${c.n}_${orient}`] : def;
      return '[' + algs.map(a => JSON.stringify(a)).join(',') + ']';
    });
    lines.push(`  ${c.n}: [${rows.join(',')}],`);
  }
  lines.push('};');
  const code = lines.join('\n');
  navigator.clipboard.writeText(code).then(() => {
    alert('Copied! Paste it to Claude and say: replace SUBCASE_ALGS with this.');
  }).catch(() => {
    prompt('Copy this and paste it to Claude:', code);
  });
}

// --- Modal ---
function openModal(caseNum, cat) {
  currentModalCase = caseNum;
  currentModalCat = cat;
  document.getElementById('modalBackdrop').classList.add('open');
  document.body.style.overflow = 'hidden';
  renderModal();
}

function renderModal() {
  const caseNum = currentModalCase;
  const cat = currentModalCat;
  if (caseNum === null) return;

  const subcases = getSubcases(cat, caseNum);
  const catLabel = CAT_DISPLAY[cat] || cat;

  document.getElementById('modalTitle').textContent = `F2L ${caseNum} — ${catLabel}`;
  document.getElementById('modalSubtitle').textContent = `${subcases.length} edge orientation${subcases.length !== 1 ? 's' : ''}`;

  const body = document.getElementById('modalBody');
  body.innerHTML = '';

  const grid = document.createElement('div');
  grid.className = 'subcase-grid';

  for (const { orient, algs: defaultAlgs } of subcases) {
    const algs = getAlgsForOrient(caseNum, orient, defaultAlgs);
    const hasCustom = getCustomAlgs()[`${caseNum}_${orient}`] !== undefined;

    const card = document.createElement('div');
    card.className = 'subcase-card';

    // Top: image + label
    const top = document.createElement('div');
    top.className = 'subcase-top';
    const resetBtn = editMode && hasCustom
      ? `<button class="reset-alg-btn" onclick="resetAlgsForOrient(${caseNum},'${orient}')" title="Reset to original">reset</button>`
      : '';
    top.innerHTML = `
      <img class="subcase-img" src="${imgPath3(cat, caseNum, orient)}" alt="${orient}" onerror="this.style.opacity='0.2'">
      <div>
        <div class="subcase-orient">${orient}</div>
        <div class="subcase-alg-count">${algs.length} alg${algs.length !== 1 ? 's' : ''}${resetBtn}</div>
      </div>
    `;
    card.appendChild(top);

    // Algorithms
    const algList = document.createElement('div');
    algList.className = 'subcase-algs';

    algs.forEach((alg, idx) => {
      const row = document.createElement('div');
      row.className = 'alg-row';

      if (editMode) {
        const input = document.createElement('input');
        input.type = 'text';
        input.className = 'alg-input';
        input.dataset.orient = orient;
        input.value = alg;
        input.placeholder = 'Type algorithm…';
        input.addEventListener('blur', () => saveAlgEdit(caseNum, orient, idx, input.value, defaultAlgs));
        input.addEventListener('keydown', e => { if (e.key === 'Enter') input.blur(); });

        const delBtn = document.createElement('button');
        delBtn.className = 'alg-delete-btn';
        delBtn.textContent = '×';
        delBtn.title = 'Remove this algorithm';
        delBtn.onclick = () => deleteAlgFromOrient(caseNum, orient, idx, defaultAlgs);

        row.appendChild(input);
        row.appendChild(delBtn);
      } else {
        row.title = 'Click to copy';
        row.onclick = () => copyAlg(alg, row);
        row.innerHTML = `
          <span class="alg-text">${alg}</span>
          <svg class="copy-icon" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        `;
      }

      algList.appendChild(row);
    });

    if (editMode) {
      const addBtn = document.createElement('button');
      addBtn.className = 'add-alg-btn';
      addBtn.textContent = '+ Add algorithm';
      addBtn.onclick = () => addAlgToOrient(caseNum, orient, defaultAlgs);
      algList.appendChild(addBtn);
    }

    card.appendChild(algList);
    grid.appendChild(card);
  }

  body.appendChild(grid);
}

function closeModal(e) {
  if (e.target === document.getElementById('modalBackdrop')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modalBackdrop').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModalDirect(); });

function renderMain() {
  const main = document.getElementById('mainContent');
  main.innerHTML = '';

  const filtered = activeFilter === 'all' ? F2L_CASES : F2L_CASES.filter(c => c.cat === activeFilter);

  // Group by category in order
  const groups = {};
  for (const cat of CAT_ORDER) groups[cat] = [];
  for (const c of filtered) groups[c.cat].push(c);

  let total = 0;
  for (const cat of CAT_ORDER) {
    if (!groups[cat].length) continue;
    total += groups[cat].length;

    const section = document.createElement('div');

    const hdr = document.createElement('div');
    hdr.className = 'section-header';
    hdr.innerHTML = `
      <span class="section-label">${CAT_DISPLAY[cat]}</span>
      <div class="section-line"></div>
      <span class="section-desc">${CAT_DESC[cat]}</span>
    `;
    section.appendChild(hdr);

    const grid = document.createElement('div');
    grid.className = 'case-grid';

    for (const c of groups[cat]) {
      const subcases = getOrientations(c.cat, c.n);
      const card = document.createElement('div');
      card.className = 'case-card';
      card.onclick = () => openModal(c.n, c.cat);
      card.innerHTML = `
        <img class="case-img" src="${imgPath2(c.cat, c.n)}" alt="F2L ${c.n}" onerror="this.style.opacity='0.3'">
        <div class="case-num">F2L ${c.n}</div>
        <div class="case-cat">${CAT_DISPLAY[c.cat]}</div>
        <div class="case-sub-count">${subcases.length} orientations</div>
        <div class="case-card-expand">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          click to view
        </div>
      `;
      grid.appendChild(card);
    }

    section.appendChild(grid);
    main.appendChild(section);
  }

  document.getElementById('caseCount').textContent = `${total} case${total !== 1 ? 's' : ''}`;
}
